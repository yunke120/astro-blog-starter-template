<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云课知识库</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
:root {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --border: #e4e7ed;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --text-tertiary: #9ca3af;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --accent-hover: #1d4ed8;
  --sidebar-w: 280px;
  --header-h: 56px;
  --radius: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --border: #334155;
    --text: #e5e7eb;
    --text-secondary: #9ca3ad;
    --text-tertiary: #6b7280;
    --accent: #60a5fa;
    --accent-light: #1e3a5f;
    --accent-hover: #93c5fd;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7;
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
::selection { background: var(--accent); color: #fff; }

/* ===== Layout ===== */
.app { display: flex; min-height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
  transform: translateX(0); transition: transform .25s ease;
}
.sidebar-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header .logo {
  font-size: 1.15em; font-weight: 700; letter-spacing: -.01em;
  color: var(--text);
}
.sidebar-header .logo span { color: var(--accent); }
.sidebar-header .sub { font-size: .78em; color: var(--text-tertiary); margin-top: 2px; }

.sidebar-search {
  padding: 12px 16px; position: relative;
}
.sidebar-search input {
  width: 100%; padding: 8px 12px 8px 34px;
  border: 1px solid var(--border); border-radius: 20px;
  font-size: .85em; background: var(--bg); color: var(--text);
  outline: none; transition: border .2s;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search .icon {
  position: absolute; left: 26px; top: 50%; transform: translateY(-50%);
  color: var(--text-tertiary); font-size: .85em; pointer-events: none;
}

.sidebar-nav {
  flex: 1; overflow-y: auto; padding: 8px 0 20px;
}
.sidebar-nav .section-label {
  padding: 16px 20px 6px; font-size: .72em; font-weight: 600;
  color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em;
}
.sidebar-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; font-size: .88em; color: var(--text-secondary);
  border-left: 3px solid transparent; transition: all .15s;
}
.sidebar-nav a:hover { background: var(--accent-light); color: var(--accent); text-decoration: none; }
.sidebar-nav a.active {
  background: var(--accent-light); color: var(--accent);
  border-left-color: var(--accent); font-weight: 500;
}
.sidebar-nav a .post-count {
  margin-left: auto; font-size: .75em; color: var(--text-tertiary);
  background: var(--bg); padding: 1px 8px; border-radius: 10px;
}

.sidebar-footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  font-size: .78em; color: var(--text-tertiary);
}

/* ===== Search Overlay ===== */
.search-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.35); z-index: 200; display: none;
  align-items: flex-start; justify-content: center; padding-top: 15vh;
  backdrop-filter: blur(2px);
}
.search-overlay.open { display: flex; }
.search-modal {
  background: var(--surface); border-radius: 12px; width: 560px; max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.15); overflow: hidden;
}
.search-modal input {
  width: 100%; padding: 16px 20px; border: none; font-size: 1em;
  outline: none; background: transparent; color: var(--text);
  border-bottom: 1px solid var(--border);
}
.search-modal input::placeholder { color: var(--text-tertiary); }
.search-results { max-height: 360px; overflow-y: auto; }
.search-results.empty { padding: 32px 20px; text-align: center; color: var(--text-tertiary); font-size: .9em; }
.search-result-item {
  display: block; padding: 14px 20px; border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.search-result-item:hover { background: var(--accent-light); text-decoration: none; }
.search-result-item .title { font-weight: 500; color: var(--text); margin-bottom: 2px; }
.search-result-item .title mark { background: #fde68a; color: var(--text); padding: 0 2px; border-radius: 2px; }
.search-result-item .desc {
  font-size: .82em; color: var(--text-tertiary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.search-result-item .path { font-size: .75em; color: var(--text-tertiary); margin-top: 2px; }
.search-modal .hint {
  padding: 10px 20px; font-size: .78em; color: var(--text-tertiary);
  border-top: 1px solid var(--border);
}

/* ===== Main Content ===== */
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 12px;
  padding: 0 32px; height: var(--header-h);
  background: rgba(248,249,251,.85); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.topbar .breadcrumb { font-size: .85em; color: var(--text-tertiary); flex: 1; }
.topbar .breadcrumb span { color: var(--text); font-weight: 500; }
.topbar .search-trigger {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 16px;
  font-size: .82em; color: var(--text-tertiary); cursor: pointer;
  background: var(--surface); display: flex; align-items: center; gap: 6px;
  transition: border .2s;
}
.topbar .search-trigger:hover { border-color: var(--accent); }
.topbar .search-trigger kbd {
  font-size: .75em; padding: 1px 6px; border: 1px solid var(--border);
  border-radius: 4px; font-family: inherit; margin-left: 6px;
}
.mobile-menu-btn {
  display: none; background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 8px; cursor: pointer; color: var(--text);
  font-size: 1.1em; line-height: 1;
}

.content-area { padding: 32px; max-width: 860px; margin: 0 auto; }

/* ===== Home Page ===== */
.home-hero { margin-bottom: 40px; }
.home-hero h1 {
  font-size: 2em; font-weight: 700; letter-spacing: -.02em;
  margin-bottom: 8px; line-height: 1.3;
}
.home-hero h1 .highlight { color: var(--accent); }
.home-hero p { color: var(--text-secondary); font-size: 1.05em; }

.home-stats {
  display: flex; gap: 24px; margin-bottom: 36px;
}
.home-stats .stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 24px; flex: 1;
}
.home-stats .stat .number { font-size: 1.6em; font-weight: 700; color: var(--accent); }
.home-stats .stat .label { font-size: .82em; color: var(--text-secondary); margin-top: 2px; }

.section-title {
  font-size: 1.1em; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

.post-list { display: flex; flex-direction: column; gap: 12px; }
.post-item {
  display: block; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
  transition: all .2s;
}
.post-item:hover {
  border-color: var(--accent); box-shadow: 0 2px 12px rgba(37,99,235,.08);
  text-decoration: none;
}
.post-item .post-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.post-item .post-meta .date { font-size: .78em; color: var(--text-tertiary); }
.post-item .post-meta .cat {
  font-size: .72em; background: var(--accent-light); color: var(--accent);
  padding: 1px 8px; border-radius: 10px;
}
.post-item .post-title {
  font-size: 1.05em; font-weight: 600; color: var(--text);
  margin-bottom: 4px;
}
.post-item .post-desc {
  font-size: .88em; color: var(--text-secondary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ===== Post Page ===== */
.post-content {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 36px;
  line-height: 1.8;
}
.post-content h1 {
  font-size: 1.6em; font-weight: 700; margin-bottom: 12px;
  letter-spacing: -.01em;
}
.post-content .post-header-meta {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
  padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.post-content .post-header-meta span { font-size: .82em; color: var(--text-tertiary); }
.post-content .post-header-meta .cat {
  background: var(--accent-light); color: var(--accent);
  padding: 1px 10px; border-radius: 10px;
}
.post-content h2 {
  font-size: 1.25em; font-weight: 600; margin: 32px 0 12px;
  padding-bottom: 6px; border-bottom: 1px solid #eee;
}
.post-content h3 {
  font-size: 1.08em; font-weight: 600; margin: 24px 0 8px; color: #333;
}
.post-content p { margin-bottom: 12px; }
.post-content ul, .post-content ol { margin: 8px 0 16px 24px; }
.post-content li { margin-bottom: 6px; }
.post-content blockquote {
  border-left: 4px solid var(--accent); background: var(--accent-light);
  padding: 12px 16px; margin: 16px 0; border-radius: 0 6px 6px 0;
  color: #374151;
}
.post-content blockquote strong { color: var(--accent); }
.post-content table {
  width: 100%; border-collapse: collapse; margin: 16px 0;
  font-size: .9em; border: 1px solid #e0e0e0;
}
.post-content th, .post-content td {
  border: 1px solid #e0e0e0; padding: 8px 12px; text-align: left;
}
.post-content th { background: var(--accent-light); color: #1e3a5f; font-weight: 600; }
.post-content tr:nth-child(even) { background: #fafbfc; }
.post-content code {
  background: #eff1f5; padding: 2px 6px; border-radius: 4px;
  font-size: .88em; font-family: "SF Mono", "Fira Code", monospace;
}
.post-content pre {
  background: #1e1e2e; color: #cdd6f4; padding: 16px;
  border-radius: 6px; overflow-x: auto; margin: 16px 0;
  font-size: .9em; line-height: 1.6;
}
.post-content hr {
  border: none; border-top: 2px dashed #ddd; margin: 32px 0;
}
.post-content .highlight-box {
  background: #fffbeb; border-left: 4px solid #f59e0b;
  padding: 12px 16px; margin: 16px 0; border-radius: 0 6px 6px 0;
}
.post-content .highlight-green {
  background: #ecfdf5; border-left: 4px solid #10b981;
  padding: 12px 16px; margin: 16px 0; border-radius: 0 6px 6px 0;
}
.post-content .checklist { list-style: none; margin-left: 0 !important; }
.post-content .checklist li { padding: 4px 0; }
.post-content .checklist li::before { content: "✓ "; color: #10b981; font-weight: 700; }

/* ===== Knowledge Graph / SVG Diagram ===== */
.diagram-container svg {
  width: 100%;
  height: auto;
  display: block;
}
.diagram-container .title {
  font-size: 20px;
  font-weight: 650;
  fill: var(--fg);
}
.diagram-container .label {
  font-size: 14px;
  font-weight: 600;
  fill: var(--fg);
}
.diagram-container .small {
  font-size: 12px;
  fill: var(--muted);
}
.diagram-container .node {
  stroke: var(--line);
  stroke-width: 1;
}
.diagram-container .neutral { fill: var(--neutral); }
.diagram-container .input { fill: var(--input); }
.diagram-container .process { fill: var(--process); }
.diagram-container .storage { fill: var(--storage); }
.diagram-container .external { fill: var(--external); }
.diagram-container .risk { fill: var(--risk); }
.diagram-container .edge {
  stroke: var(--line);
  stroke-width: 1.5;
  fill: none;
}
.diagram-container .zone {
  fill: none;
  stroke: var(--line);
  stroke-width: 1;
  stroke-dasharray: 6 5;
  opacity: 0.8;
}

.back-link {
  display: inline-block; margin-bottom: 16px; font-size: .88em;
  color: var(--accent);
}
.back-link::before { content: "← "; }

/* ===== Mobile Overlay ===== */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3);
  z-index: 90;
}
.sidebar-overlay.open { display: block; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.1); }
  .main { margin-left: 0; }
  .mobile-menu-btn { display: inline-flex; }
  .topbar { padding: 0 16px; gap: 8px; }
  .topbar .search-trigger span { display: none; }
  .content-area { padding: 20px 16px; }
  .home-stats { flex-direction: column; gap: 12px; }
  .post-content { padding: 20px; }
  .post-content table { font-size: .8em; }
  .search-modal { width: 100%; max-width: 100%; border-radius: 0; }
  .search-overlay { padding-top: 0; align-items: stretch; }
}
@media (max-width: 480px) {
  .home-hero h1 { font-size: 1.5em; }
}
</style>
</head>
<body>
<div class="app">

<!-- ===== Sidebar ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><span>✦</span> FeynmanNote</div>
    <div class="sub">用输出倒逼输入</div>
  </div>
  <div class="sidebar-search">
    <span class="icon">🔍</span>
    <input type="text" id="sidebarSearch" placeholder="搜索知识…" autocomplete="off">
  </div>
  <nav class="sidebar-nav" id="sidebarNav">
    <div class="section-label">📚 知识库</div>
    <a href="/" class="active">🏠 首页</a>
    <div class="section-label">🔧 硬件笔记</div>
    <a href="/posts/变压器与耦合电感的区别与联系/" data-title="变压器与耦合电感的区别与联系">
      变压器 vs 耦合电感
    </a>
    <a href="/posts/三极管的三种工作状态/" data-title="三极管的三种工作状态">
      三极管的三种工作状态
    </a>
  </nav>
  <div class="sidebar-footer">yunke120 · FeynmanNote · 2026</div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ===== Main ===== -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <button class="mobile-menu-btn" id="menuBtn">☰</button>
    <div class="breadcrumb">首页 <span id="pageTitle">FeynmanNote</span></div>
    <div class="search-trigger" id="searchTrigger">
      🔍 <span>搜索</span>
      <kbd>⌘K</kbd>
    </div>
  </div>

  <div class="content-area" id="contentArea">
    <!-- Content rendered by JS -->
  </div>

</div>
</div>

<!-- ===== Search Overlay ===== -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-modal">
    <input type="text" id="searchInput" placeholder="搜索文章标题、标签、内容…" autofocus>
    <div class="search-results empty" id="searchResults">
      <div>输入关键词开始搜索</div>
    </div>
    <div class="hint">↑↓ 导航 &nbsp;·&nbsp; Enter 打开 &nbsp;·&nbsp; Esc 关闭</div>
  </div>
</div>

<script>
// ===== Post Data =====
const POSTS = [
  {
    slug: "变压器与耦合电感的区别与联系",
    title: "变压器 vs 耦合电感的区别与联系",
    date: "2026-06-21",
    cat: "🔧 硬件笔记",
    desc: "从概念模糊到系统性理解——用费曼学习法拆解变压器和耦合电感的物理基础、设计目的和应用场景。",
    tags: ["硬件", "模拟电路", "开关电源", "费曼学习法"],
    content: ""  // will be loaded on demand
  },
  {
    slug: "三极管的三种工作状态",
    title: "三极管的三种工作状态",
    date: "2026-06-22",
    cat: "🔧 硬件笔记",
    desc: "截止区、放大区、饱和区——用费曼学习法理解三极管三种状态的本质、应用场景和静态工作点设计。",
    tags: ["硬件", "模拟电路", "三极管", "费曼学习法"],
    content: ""
  }
];

// ===== State =====
let currentPage = 'home';
let searchIndex = POSTS.map(p => ({ ...p }));
let searchOpen = false;

// ===== Router =====
function navigate(path) {
  if (path === '/' || path === '/index.html') {
    showHome();
  } else if (path.startsWith('/posts/')) {
    const slug = path.replace('/posts/', '').replace(/\/$/, '').replace(/\/index\.html$/, '');
    const post = POSTS.find(p => p.slug === slug);
    if (post) showPost(post);
    else showHome();
  }
}

// ===== Home =====
function showHome() {
  currentPage = 'home';
  document.getElementById('pageTitle').textContent = '知识库';
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector('.sidebar-nav a[href="/"]').classList.add('active');

  const postsHtml = POSTS.map(p => `
    <a class="post-item" href="/posts/${p.slug}/">
      <div class="post-meta">
        <span class="date">${p.date}</span>
        <span class="cat">${p.cat}</span>
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-desc">${p.desc}</div>
    </a>
  `).join('');

  document.getElementById('contentArea').innerHTML = `
    <div class="home-hero">
      <h1>欢迎来到 <span class="highlight">FeynmanNote</span></h1>
      <p>用费曼学习法拆解知识，用输出倒逼输入。</p>
    </div>
    <div class="home-stats">
      <div class="stat">
        <div class="number">${POSTS.length}</div>
        <div class="label">📝 文章</div>
      </div>
      <div class="stat">
        <div class="number">${new Set(POSTS.map(p => p.cat)).size}</div>
        <div class="label">📂 分类</div>
      </div>
      <div class="stat">
        <div class="number">${POSTS.reduce((s, p) => s + p.tags.length, 0)}</div>
        <div class="label">🏷️ 标签</div>
      </div>
    </div>
    <div class="section-title">📝 最新笔记</div>
    <div class="post-list">${postsHtml}</div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== Post =====
function showPost(post) {
  currentPage = 'post';
  document.getElementById('pageTitle').textContent = post.title;
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  const navLink = document.querySelector(`.sidebar-nav a[data-title="${post.title}"]`);
  if (navLink) navLink.classList.add('active');

  // Update breadcrumb
  document.querySelector('.breadcrumb').innerHTML = `
    <a href="/" style="color:var(--text-tertiary)">首页</a>
    <span style="color:var(--text-tertiary);margin:0 4px">/</span>
    <span>${post.title}</span>
  `;

  const container = document.getElementById('contentArea');

  // ===== Load post content =====
  const contentPath = `/posts/${post.slug}/content.html`;
  const diagramPath = `/posts/${post.slug}/diagram.html`;

  Promise.all([
    fetch(contentPath).then(r => { if (!r.ok) throw new Error(); return r.text(); }),
    fetch(diagramPath).then(r => r.ok ? r.text() : Promise.resolve(''))
  ])
    .then(([contentHtml, diagramHtml]) => {
      // Extract SVG from diagram HTML
      let diagramSvg = '';
      if (diagramHtml) {
        const match = diagramHtml.match(/<svg[\s\S]*?<\/svg>/i);
        if (match) {
          diagramSvg = match[0];
        }
      }

      container.innerHTML = `
        <a href="/" class="back-link">返回首页</a>
        <div class="post-content">
          ${contentHtml}
        </div>
        ${diagramSvg ? `
        <div class="post-content" style="margin-top:24px;">
          <h2 style="border-bottom:none;margin-bottom:4px;">🗺️ 知识图谱</h2>
          <p style="color:var(--text-tertiary);font-size:0.85em;margin-bottom:16px;">交互式 SVG 知识图谱，支持放大查看</p>
          <div class="diagram-container" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;overflow-x:auto;">
            ${diagramSvg}
          </div>
        </div>` : ''}
      `;
    })
    .catch(() => {
      container.innerHTML = `
        <a href="/" class="back-link">返回首页</a>
        <div class="post-content">
          <h1>${post.title}</h1>
          <div class="post-header-meta">
            <span>📅 ${post.date}</span>
            <span class="cat">${post.cat}</span>
            <span>🏷️ ${post.tags.join(' · ')}</span>
          </div>
          <p>${post.desc}</p>
          <p style="color:var(--text-tertiary);margin-top:32px;">📄 内容加载中，请稍候……</p>
        </div>
      `;
    });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== Search =====
function openSearch() {
  searchOpen = true;
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '<div class="search-results empty">输入关键词开始搜索</div>';
  setTimeout(() => document.getElementById('searchInput').focus(), 100);
}

function closeSearch() {
  searchOpen = false;
  document.getElementById('searchOverlay').classList.remove('open');
}

function performSearch(query) {
  const q = query.toLowerCase().trim();
  const results = document.getElementById('searchResults');
  if (!q) {
    results.innerHTML = '<div class="search-results empty">输入关键词开始搜索</div>';
    return;
  }
  const matches = searchIndex.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.desc.toLowerCase().includes(q) ||
    p.tags.some(t => t.toLowerCase().includes(q))
  );
  if (matches.length === 0) {
    results.innerHTML = '<div class="search-results empty">未找到相关内容，试试其他关键词</div>';
    return;
  }
  results.innerHTML = matches.map(p => {
    const hlTitle = p.title.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`);
    const hlDesc = p.desc.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`);
    return `<a class="search-result-item" href="/posts/${p.slug}/" onclick="closeSearch()">
      <div class="title">${hlTitle}</div>
      <div class="desc">${hlDesc}</div>
      <div class="path">${p.cat}</div>
    </a>`;
  }).join('');
}

// ===== Sidebar Search Filter =====
document.getElementById('sidebarSearch').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.sidebar-nav a[data-title]').forEach(a => {
    const title = a.getAttribute('data-title').toLowerCase();
    a.style.display = (!q || title.includes(q)) ? 'flex' : 'none';
  });
});

// ===== Event Listeners =====
document.getElementById('searchTrigger').addEventListener('click', openSearch);
document.getElementById('searchOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSearch();
});
document.getElementById('searchInput').addEventListener('input', e => performSearch(e.target.value));
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape' && searchOpen) closeSearch();
});

// Menu toggle
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});

// ===== Client-side Routing =====
document.addEventListener('click', e => {
  const link = e.target.closest('a');
  if (!link) return;
  const href = link.getAttribute('href');
  if (!href) return;
  // Internal navigation
  if (href.startsWith('/')) {
    e.preventDefault();
    // Close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
    // Push state and navigate
    history.pushState(null, '', href);
    navigate(href);
  }
});

window.addEventListener('popstate', () => navigate(location.pathname));

// ===== Init =====
navigate(location.pathname);
</script>
