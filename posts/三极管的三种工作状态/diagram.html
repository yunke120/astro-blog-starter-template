<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>知识图谱：三极管的三种工作状态</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main { max-width: 1000px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 14px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 12px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.8; }
</style>
<main>
  <svg viewBox="0 0 940 860">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto" fill="var(--line)">
        <path d="M0,0 L10,5 L0,10 Z" />
      </marker>
    </defs>

    <!-- ===== Title ===== -->
    <text x="470" y="30" text-anchor="middle" class="title">🧠 三极管的三种工作状态 — 完整知识图谱</text>

    <!-- ===== Edges ===== -->
    <!-- 核心概念 → 三极管的本质 -->
    <path d="M470,65 L470,95" class="edge" marker-end="url(#arrow)" />

    <!-- 本质 → 三种状态 -->
    <path d="M470,170 L470,200" class="edge" />
    <path d="M470,200 L160,200 L160,230" class="edge" marker-end="url(#arrow)" />
    <path d="M470,200 L470,230" class="edge" marker-end="url(#arrow)" />
    <path d="M470,200 L780,200 L780,230" class="edge" marker-end="url(#arrow)" />

    <!-- 截止区连线 -->
    <path d="M160,305 L160,335" class="edge" />
    <path d="M160,335 L60,335 L60,365" class="edge" marker-end="url(#arrow)" />
    <path d="M160,335 L160,365" class="edge" marker-end="url(#arrow)" />
    <path d="M160,335 L260,335 L260,365" class="edge" marker-end="url(#arrow)" />

    <!-- 放大区连线 -->
    <path d="M470,305 L470,335" class="edge" />
    <path d="M470,335 L370,335 L370,365" class="edge" marker-end="url(#arrow)" />
    <path d="M470,335 L470,365" class="edge" marker-end="url(#arrow)" />
    <path d="M470,335 L570,335 L570,365" class="edge" marker-end="url(#arrow)" />

    <!-- 饱和区连线 -->
    <path d="M780,305 L780,335" class="edge" />
    <path d="M780,335 L680,335 L680,365" class="edge" marker-end="url(#arrow)" />
    <path d="M780,335 L780,365" class="edge" marker-end="url(#arrow)" />
    <path d="M780,335 L880,335 L880,365" class="edge" marker-end="url(#arrow)" />

    <!-- 各区域到应用 -->
    <path d="M160,440 L160,470" class="edge" marker-end="url(#arrow)" />
    <path d="M470,440 L470,470" class="edge" marker-end="url(#arrow)" />
    <path d="M780,440 L780,470" class="edge" marker-end="url(#arrow)" />

    <path d="M160,545 L160,575" class="edge" />

    <path d="M470,545 L470,575" class="edge" />

    <path d="M470,575 L550,575 L550,605" class="edge" marker-end="url(#arrow)" />

    <path d="M780,545 L780,575" class="edge" />
    <path d="M780,575 L700,575 L700,605" class="edge" marker-end="url(#arrow)" />
    <path d="M780,575 L860,575 L860,605" class="edge" marker-end="url(#arrow)" />

    <!-- 延伸：静态工作点 -->
    <path d="M470,200 L470,650" class="edge" />
    <path d="M470,650 L350,650 L350,680" class="edge" marker-end="url(#arrow)" />
    <path d="M470,650 L470,680" class="edge" marker-end="url(#arrow)" />
    <path d="M470,650 L590,650 L590,680" class="edge" marker-end="url(#arrow)" />

    <path d="M350,755 L350,785" class="edge" marker-end="url(#arrow)" />
    <path d="M590,755 L590,785" class="edge" marker-end="url(#arrow)" />
    <path d="M470,755 L470,785" class="edge" marker-end="url(#arrow)" />

    <!-- ===== Nodes ===== -->

    <!-- Root -->
    <rect x="350" y="65" width="240" height="30" rx="15" class="node process" />
    <text x="470" y="85" text-anchor="middle" class="label">三极管（BJT）核心概念</text>

    <!-- 本质 -->
    <rect x="370" y="140" width="200" height="30" rx="15" class="node neutral" />
    <text x="470" y="160" text-anchor="middle" class="label">基极电流控制集电极电流</text>

    <!-- 截止区 -->
    <rect x="70" y="230" width="180" height="75" rx="8" class="node risk" />
    <text x="160" y="258" text-anchor="middle" class="label">🚫 截止区</text>
    <text x="160" y="276" text-anchor="middle" class="small">Ib = 0</text>
    <text x="160" y="292" text-anchor="middle" class="small">Ic ≈ 0</text>

    <!-- 放大区 -->
    <rect x="380" y="230" width="180" height="75" rx="8" class="node input" />
    <text x="470" y="258" text-anchor="middle" class="label">📈 放大区</text>
    <text x="470" y="276" text-anchor="middle" class="small">0 < Ib < 临界</text>
    <text x="470" y="292" text-anchor="middle" class="small">Ic = β × Ib</text>

    <!-- 饱和区 -->
    <rect x="690" y="230" width="180" height="75" rx="8" class="node storage" />
    <text x="780" y="258" text-anchor="middle" class="label">💧 饱和区</text>
    <text x="780" y="276" text-anchor="middle" class="small">Ib ≥ 临界</text>
    <text x="780" y="292" text-anchor="middle" class="small">Ic = Ic_max</text>

    <!-- 截止 - 细节 -->
    <rect x="10" y="365" width="100" height="75" rx="8" class="node" />
    <text x="60" y="388" text-anchor="middle" class="small" style="font-weight:600;">特点</text>
    <text x="60" y="406" text-anchor="middle" class="small">门关死</text>
    <text x="60" y="424" text-anchor="middle" class="small">电流不通</text>

    <rect x="110" y="365" width="100" height="75" rx="8" class="node" />
    <text x="160" y="388" text-anchor="middle" class="small" style="font-weight:600;">等效</text>
    <text x="160" y="406" text-anchor="middle" class="small">断开的开关</text>
    <text x="160" y="424" text-anchor="middle" class="small">数字"0"</text>

    <rect x="210" y="365" width="100" height="75" rx="8" class="node" />
    <text x="260" y="388" text-anchor="middle" class="small" style="font-weight:600;">水龙头</text>
    <text x="260" y="406" text-anchor="middle" class="small">拧死</text>
    <text x="260" y="424" text-anchor="middle" class="small">不出水</text>

    <!-- 放大 - 细节 -->
    <rect x="320" y="365" width="100" height="75" rx="8" class="node" />
    <text x="370" y="388" text-anchor="middle" class="small" style="font-weight:600;">特点</text>
    <text x="370" y="406" text-anchor="middle" class="small">门半开</text>
    <text x="370" y="424" text-anchor="middle" class="small">线性调节</text>

    <rect x="420" y="365" width="100" height="75" rx="8" class="node" />
    <text x="470" y="388" text-anchor="middle" class="small" style="font-weight:600;">等效</text>
    <text x="470" y="406" text-anchor="middle" class="small">可控电流源</text>
    <text x="470" y="424" text-anchor="middle" class="small">β 倍放大</text>

    <rect x="520" y="365" width="100" height="75" rx="8" class="node" />
    <text x="570" y="388" text-anchor="middle" class="small" style="font-weight:600;">水龙头</text>
    <text x="570" y="406" text-anchor="middle" class="small">微调</text>
    <text x="570" y="424" text-anchor="middle" class="small">成比例出水</text>

    <!-- 饱和 - 细节 -->
    <rect x="630" y="365" width="100" height="75" rx="8" class="node" />
    <text x="680" y="388" text-anchor="middle" class="small" style="font-weight:600;">特点</text>
    <text x="680" y="406" text-anchor="middle" class="small">门全开</text>
    <text x="680" y="424" text-anchor="middle" class="small">不再增加</text>

    <rect x="730" y="365" width="100" height="75" rx="8" class="node" />
    <text x="780" y="388" text-anchor="middle" class="small" style="font-weight:600;">等效</text>
    <text x="780" y="406" text-anchor="middle" class="small">闭合的开关</text>
    <text x="780" y="424" text-anchor="middle" class="small">数字"1"</text>

    <rect x="830" y="365" width="100" height="75" rx="8" class="node" />
    <text x="880" y="388" text-anchor="middle" class="small" style="font-weight:600;">水龙头</text>
    <text x="880" y="406" text-anchor="middle" class="small">拧到底</text>
    <text x="880" y="424" text-anchor="middle" class="small">水最大</text>

    <!-- 应用标签 -->
    <rect x="100" y="470" width="120" height="30" rx="15" class="node external" />
    <text x="160" y="490" text-anchor="middle" class="small" style="font-weight:600;">🔌 应用</text>

    <rect x="410" y="470" width="120" height="30" rx="15" class="node external" />
    <text x="470" y="490" text-anchor="middle" class="small" style="font-weight:600;">🔌 应用</text>

    <rect x="720" y="470" width="120" height="30" rx="15" class="node external" />
    <text x="780" y="490" text-anchor="middle" class="small" style="font-weight:600;">🔌 应用</text>

    <!-- 截止应用 -->
    <rect x="20" y="605" width="120" height="55" rx="8" class="node" />
    <text x="80" y="626" text-anchor="middle" class="small" style="font-weight:600;">数字电路 0</text>
    <text x="80" y="644" text-anchor="middle" class="small">关断负载</text>

    <rect x="180" y="605" width="120" height="55" rx="8" class="node" />
    <text x="240" y="626" text-anchor="middle" class="small" style="font-weight:600;">休眠待机</text>
    <text x="240" y="644" text-anchor="middle" class="small">低功耗</text>

    <!-- 放大应用 -->
    <rect x="330" y="605" width="120" height="55" rx="8" class="node" />
    <text x="390" y="626" text-anchor="middle" class="small" style="font-weight:600;">音频放大</text>
    <text x="390" y="644" text-anchor="middle" class="small">传感器调理</text>

    <rect x="490" y="605" width="120" height="55" rx="8" class="node" />
    <text x="550" y="626" text-anchor="middle" class="small" style="font-weight:600;">驱动增强</text>
    <text x="550" y="644" text-anchor="middle" class="small">阻抗匹配</text>

    <!-- 饱和应用 -->
    <rect x="640" y="605" width="120" height="55" rx="8" class="node" />
    <text x="700" y="626" text-anchor="middle" class="small" style="font-weight:600;">数字电路 1</text>
    <text x="700" y="644" text-anchor="middle" class="small">开关电源</text>

    <rect x="800" y="605" width="120" height="55" rx="8" class="node" />
    <text x="860" y="626" text-anchor="middle" class="small" style="font-weight:600;">继电器</text>
    <text x="860" y="644" text-anchor="middle" class="small">电机驱动</text>

    <!-- 延伸：静态工作点 -->
    <rect x="290" y="680" width="120" height="30" rx="15" class="node process" />
    <text x="350" y="700" text-anchor="middle" class="small" style="font-weight:600;">固定偏置</text>

    <rect x="410" y="680" width="120" height="30" rx="15" class="node risk" />
    <text x="470" y="700" text-anchor="middle" class="small" style="font-weight:600;">静态工作点</text>

    <rect x="530" y="680" width="120" height="30" rx="15" class="node storage" />
    <text x="590" y="700" text-anchor="middle" class="small" style="font-weight:600;">分压式偏置</text>

    <!-- 固定偏置详情 -->
    <rect x="270" y="785" width="160" height="55" rx="8" class="node" />
    <text x="350" y="806" text-anchor="middle" class="small" style="font-weight:600;">结构简单</text>
    <text x="350" y="824" text-anchor="middle" class="small">❌ 温漂敏感</text>

    <!-- 工作点设计 -->
    <rect x="385" y="785" width="170" height="55" rx="8" class="node" />
    <text x="470" y="806" text-anchor="middle" class="small" style="font-weight:600;">设计口诀</text>
    <text x="470" y="824" text-anchor="middle" class="small">Vce=Vcc/2 → 选 Ic → 算 Rc</text>

    <!-- 分压偏置详情 -->
    <rect x="520" y="785" width="140" height="55" rx="8" class="node" />
    <text x="590" y="806" text-anchor="middle" class="small" style="font-weight:600;">加 Re 反馈</text>
    <text x="590" y="824" text-anchor="middle" class="small">✅ 可量产</text>

    <!-- ===== Legend ===== -->
    <rect x="20" y="20" width="180" height="80" rx="8" class="zone" />
    <rect x="35" y="33" width="12" height="12" rx="3" class="risk" stroke="var(--line)" stroke-width="1" />
    <text x="53" y="44" class="small">截止区</text>
    <rect x="35" y="53" width="12" height="12" rx="3" class="input" stroke="var(--line)" stroke-width="1" />
    <text x="53" y="64" class="small">放大区</text>
    <rect x="35" y="73" width="12" height="12" rx="3" class="storage" stroke="var(--line)" stroke-width="1" />
    <text x="53" y="84" class="small">饱和区</text>
  </svg>
</main>
