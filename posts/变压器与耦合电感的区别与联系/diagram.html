<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>知识图谱：变压器 vs 耦合电感</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main { max-width: 1000px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 14px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 12px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.8; }
</style>
<main>
  <svg viewBox="0 0 940 820">
    <!-- ===== Title ===== -->
    <text x="470" y="30" text-anchor="middle" class="title">🧠 变压器 vs 耦合电感 — 完整知识图谱</text>

    <!-- ===== Edges ===== -->
    <!-- 物理基础 → 电磁感应 -->
    <path d="M470,65 L470,95" class="edge" marker-end="url(#arrow)" />

    <!-- 电磁感应 → 两个分支 -->
    <path d="M470,170 L470,200" class="edge" />
    <path d="M470,200 L220,200 L220,230" class="edge" marker-end="url(#arrow)" />
    <path d="M470,200 L720,200 L720,230" class="edge" marker-end="url(#arrow)" />

    <!-- 变压器内部连线 -->
    <path d="M220,305 L220,335" class="edge" />
    <path d="M220,335 L100,335 L100,365" class="edge" marker-end="url(#arrow)" />
    <path d="M220,335 L340,335 L340,365" class="edge" marker-end="url(#arrow)" />
    <path d="M220,380 L220,410" class="edge" />
    <path d="M220,410 L100,410 L100,440" class="edge" marker-end="url(#arrow)" />
    <path d="M220,410 L340,410 L340,440" class="edge" marker-end="url(#arrow)" />

    <!-- 工频变压器连线 -->
    <path d="M100,440 L100,470" class="edge" />
    <path d="M100,470 L40,470 L40,500" class="edge" marker-end="url(#arrow)" />
    <path d="M100,470 L160,470 L160,500" class="edge" marker-end="url(#arrow)" />

    <!-- 高频变压器连线 -->
    <path d="M340,440 L340,470" class="edge" />
    <path d="M340,470 L280,470 L280,500" class="edge" marker-end="url(#arrow)" />
    <path d="M340,470 L400,470 L400,500" class="edge" marker-end="url(#arrow)" />

    <!-- 耦合电感内部连线 -->
    <path d="M720,305 L720,335" class="edge" />
    <path d="M720,335 L600,335 L600,365" class="edge" marker-end="url(#arrow)" />
    <path d="M720,335 L840,335 L840,365" class="edge" marker-end="url(#arrow)" />
    <path d="M720,380 L720,410" class="edge" />
    <path d="M720,410 L600,410 L600,440" class="edge" marker-end="url(#arrow)" />
    <path d="M720,410 L840,410 L840,440" class="edge" marker-end="url(#arrow)" />

    <!-- 优势场景连线 -->
    <path d="M720,515 L720,545" class="edge" />
    <path d="M720,545 L620,545 L620,575" class="edge" marker-end="url(#arrow)" />
    <path d="M720,545 L720,575" class="edge" marker-end="url(#arrow)" />
    <path d="M720,545 L820,545 L820,575" class="edge" marker-end="url(#arrow)" />

    <!-- 知识扩展分支 -->
    <path d="M470,200 L470,630" class="edge" />
    <path d="M470,630 L350,630 L350,660" class="edge" marker-end="url(#arrow)" />
    <path d="M470,630 L470,660" class="edge" marker-end="url(#arrow)" />
    <path d="M470,630 L590,630 L590,660" class="edge" marker-end="url(#arrow)" />

    <!-- ===== Nodes ===== -->
    <!-- Root: 物理基础 -->
    <rect x="360" y="140" width="220" height="30" rx="15" class="node neutral" />
    <text x="470" y="160" text-anchor="middle" class="label">电磁感应（物理基础）</text>

    <!-- Root node -->
    <rect x="370" y="65" width="200" height="30" rx="15" class="node process" />
    <text x="470" y="85" text-anchor="middle" class="label">两个线圈挨在一起</text>

    <!-- 变压器 -->
    <rect x="120" y="230" width="200" height="75" rx="8" class="node input" />
    <text x="220" y="258" text-anchor="middle" class="label">🔵 变压器</text>
    <text x="220" y="276" text-anchor="middle" class="small">匝数比 ≠ 1</text>
    <text x="220" y="292" text-anchor="middle" class="small">主变压 + 电气隔离</text>

    <!-- 变压器 - 设计目的 -->
    <rect x="20" y="365" width="160" height="75" rx="8" class="node" />
    <text x="100" y="390" text-anchor="middle" class="small" style="font-weight:600;">设计目的</text>
    <text x="100" y="408" text-anchor="middle" class="small">改变电压大小</text>
    <text x="100" y="424" text-anchor="middle" class="small">输入输出隔离</text>

    <!-- 变压器 - 电流特性 -->
    <rect x="260" y="365" width="160" height="75" rx="8" class="node" />
    <text x="340" y="390" text-anchor="middle" class="small" style="font-weight:600;">电流特性</text>
    <text x="340" y="408" text-anchor="middle" class="small">原副边</text>
    <text x="340" y="424" text-anchor="middle" class="small">不一定同时导通</text>

    <!-- 工频变压器 -->
    <rect x="10" y="500" width="180" height="75" rx="8" class="node external" />
    <text x="100" y="524" text-anchor="middle" class="small" style="font-weight:600;">工频变压器</text>
    <text x="100" y="542" text-anchor="middle" class="small">50/60Hz 电网频率</text>
    <text x="100" y="558" text-anchor="middle" class="small">大体积 · 低效率</text>

    <!-- 高频变压器 -->
    <rect x="250" y="500" width="180" height="75" rx="8" class="node input" />
    <text x="340" y="524" text-anchor="middle" class="small" style="font-weight:600;">高频变压器</text>
    <text x="340" y="542" text-anchor="middle" class="small">几十 ~ 几百 kHz</text>
    <text x="340" y="558" text-anchor="middle" class="small">小体积 · 高效率</text>

    <!-- 耦合电感 -->
    <rect x="620" y="230" width="200" height="75" rx="8" class="node storage" />
    <text x="720" y="258" text-anchor="middle" class="label">🟢 耦合电感</text>
    <text x="720" y="276" text-anchor="middle" class="small">匝数比通常 1:1</text>
    <text x="720" y="292" text-anchor="middle" class="small">主储能 + 能量传递</text>

    <!-- 耦合电感 - 设计目的 -->
    <rect x="520" y="365" width="160" height="75" rx="8" class="node" />
    <text x="600" y="390" text-anchor="middle" class="small" style="font-weight:600;">设计目的</text>
    <text x="600" y="408" text-anchor="middle" class="small">储存能量</text>
    <text x="600" y="424" text-anchor="middle" class="small">在电路间传递</text>

    <!-- 耦合电感 - 电流特性 -->
    <rect x="760" y="365" width="160" height="75" rx="8" class="node" />
    <text x="840" y="390" text-anchor="middle" class="small" style="font-weight:600;">电流特性</text>
    <text x="840" y="408" text-anchor="middle" class="small">原副边</text>
    <text x="840" y="424" text-anchor="middle" class="small">同时有电流</text>

    <!-- 优势场景 -->
    <rect x="570" y="575" width="100" height="55" rx="8" class="node external" />
    <text x="620" y="596" text-anchor="middle" class="small" style="font-weight:600;">多路输出</text>
    <text x="620" y="614" text-anchor="middle" class="small">单源多压</text>

    <rect x="670" y="575" width="100" height="55" rx="8" class="node external" />
    <text x="720" y="596" text-anchor="middle" class="small" style="font-weight:600;">纹波抵消</text>
    <text x="720" y="614" text-anchor="middle" class="small">噪声更小</text>

    <rect x="770" y="575" width="100" height="55" rx="8" class="node external" />
    <text x="820" y="596" text-anchor="middle" class="small" style="font-weight:600;">高密度</text>
    <text x="820" y="614" text-anchor="middle" class="small">磁芯合一</text>

    <!-- 知识扩展 -->
    <rect x="290" y="660" width="120" height="55" rx="8" class="node process" />
    <text x="350" y="681" text-anchor="middle" class="small" style="font-weight:600;">非隔离型 DC-DC</text>
    <text x="350" y="699" text-anchor="middle" class="small">用耦合电感</text>

    <rect x="410" y="660" width="120" height="55" rx="8" class="node risk" />
    <text x="470" y="681" text-anchor="middle" class="small" style="font-weight:600;">隔离型 DC-DC</text>
    <text x="470" y="699" text-anchor="middle" class="small">用高频变压器</text>

    <rect x="530" y="660" width="120" height="55" rx="8" class="node" />
    <text x="590" y="681" text-anchor="middle" class="small" style="font-weight:600;">工程设计权衡</text>
    <text x="590" y="699" text-anchor="middle" class="small">效率 vs 安全</text>

    <!-- ===== Legend ===== -->
    <rect x="20" y="740" width="900" height="60" rx="8" class="zone" />
    <rect x="40" y="753" width="14" height="14" rx="3" class="input" stroke="var(--line)" stroke-width="1" />
    <text x="60" y="765" class="small">变压器相关</text>
    <rect x="160" y="753" width="14" height="14" rx="3" class="storage" stroke="var(--line)" stroke-width="1" />
    <text x="180" y="765" class="small">耦合电感相关</text>
    <rect x="300" y="753" width="14" height="14" rx="3" class="external" stroke="var(--line)" stroke-width="1" />
    <text x="320" y="765" class="small">特征/应用</text>
    <rect x="410" y="753" width="14" height="14" rx="3" class="process" stroke="var(--line)" stroke-width="1" />
    <text x="430" y="765" class="small">知识延伸</text>
    <rect x="530" y="753" width="14" height="14" rx="3" class="risk" stroke="var(--line)" stroke-width="1" />
    <text x="550" y="765" class="small">权衡决策</text>
    <line x1="680" y1="760" x2="750" y2="760" class="edge" />
    <text x="760" y="765" class="small">衍生/包含关系</text>
  </svg>
</main>
