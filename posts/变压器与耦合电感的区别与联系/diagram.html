<!doctype html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>知识图谱：变压器 vs 耦合电感</title>
<style>
  :root {

    --diagram-storage: #99f6e4;
    --diagram-external: #fde68a;
    --diagram-risk: #fecaca;

  @media (prefers-color-scheme: dark) {

      --diagram-fg: #e5e7eb;

      --diagram-line: #94a3b8;

  body { margin: 0; background: var(--diagram-bg); font: 14px/1.4 sans-serif; }
  svg { width: 100%; height: auto; display: block; }
</style>

<body>

  <rect x="120" y="230" width="200" height="75" rx="8" fill="var(--diagram-input)" stroke="var(--diagram-line)" stroke-width="1" />
  <text x="220" y="258" text-anchor="middle" fill="var(--diagram-fg)" font-size="14" font-weight="600">🔵 变压器</text>
  <text x="220" y="276" text-anchor="middle" fill="var(--diagram-muted)" font-size="12">匝数比 ≠ 1</text>

  <text x="100" y="524" text-anchor="middle" fill="var(--diagram-fg)" font-size="12" font-weight="600">工频变压器</text>

  <text x="100" y="558" text-anchor="middle" fill="var(--diagram-muted)" font-size="12">大体积 · 低效率</text>

  <text x="340" y="558" text-anchor="middle" fill="var(--diagram-muted)" font-size="12">小体积 · 高效率</text>

  <text x="720" y="276" text-anchor="middle" fill="var(--diagram-muted)" font-size="12">匝数比通常 1:1</text>
  <text x="720" y="292" text-anchor="middle" fill="var(--diagram-muted)" font-size="12">主储能 + 能量传递</text>

  <text x="470" y="681" text-anchor="middle" fill="var(--diagram-fg)" font-size="12" font-weight="600">隔离型 DC-DC</text>
  <text x="470" y="699" text-anchor="middle" fill="var(--diagram-muted)" font-size="12">用高频变压器</text>
